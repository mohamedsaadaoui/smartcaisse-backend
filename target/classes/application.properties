server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/smartcaisse
spring.datasource.username=postgres
spring.datasource.password=1993
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Generate a strong secret: openssl rand -hex 64
jwt.secret=change_this_to_a_very_long_random_secret_key_at_least_64_chars_long
jwt.expiration=86400000

app.name=SmartCaisse
